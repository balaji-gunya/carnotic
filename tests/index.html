<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carnotic Tests</title>
  <style>
    body { font-family: monospace; margin: 24px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 18px; margin-bottom: 20px; color: #94a3b8; }
    .suite { margin-bottom: 24px; }
    .suite-title { font-size: 14px; font-weight: bold; color: #7dd3fc; margin-bottom: 8px; }
    .result { font-size: 13px; padding: 3px 0; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .err  { color: #fb923c; font-size: 11px; margin-left: 20px; }
    .summary { margin-top: 24px; font-size: 15px; font-weight: bold; border-top: 1px solid #334155; padding-top: 16px; }
    .ok  { color: #4ade80; }
    .bad { color: #f87171; }
    /* Hide everything used only for DOM tests */
    #test-fixture { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
<h1>Carnotic — Test Runner</h1>
<div id="output"></div>
<div class="summary" id="summary"></div>

<!-- Hidden fixture for DOM tests -->
<div id="test-fixture">
  <nav></nav>
  <div id="grid"></div>
  <div id="empty-state"><div class="empty-box"><div id="add-triggers"></div></div></div>
  <div id="grid-area"></div>
  <div id="download-btn" style="display:none"></div>
  <div id="export-btn"   style="display:none"></div>
  <div id="swara-popup">
    <div class="swara-popup-title" id="swara-popup-title"></div>
    <div class="swara-popup-grid"  id="swara-popup-grid"></div>
    <div class="speed-row">
      <button class="speed-btn active" data-speed="0">1×</button>
      <button class="speed-btn"        data-speed="2">2×</button>
      <button class="speed-btn"        data-speed="4">4×</button>
      <button class="speed-btn"        data-speed="3">Tisra</button>
    </div>
    <div class="gamaka-row">
      <button class="gamaka-btn" data-gamaka="wave">Wave</button>
      <button class="gamaka-btn" data-gamaka="slide">Slide</button>
    </div>
  </div>
  <div id="dir-popup" style="display:none">
    <button class="dir-opt" data-dir="up">↑</button>
    <button class="dir-opt" data-dir="both">↑↓</button>
    <button class="dir-opt" data-dir="down">↓</button>
  </div>
  <input id="song-title" type="text">
  <input id="composer"   type="text">
</div>

<!-- Load all modules in the same order as editor.html -->
<script src="../assets/js/state.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/popups.js"></script>
<script src="../assets/js/menu.js"></script>
<script src="../assets/js/rows.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/operations.js"></script>
<script src="../assets/js/export.js"></script>
<script src="tests.js"></script>
</body>
</html>
