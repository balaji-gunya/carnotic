<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnotic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #b91c1c;
      letter-spacing: -0.3px;
      white-space: nowrap;
      flex: 1;
    }

    .brand sub {
      font-size: 0.6rem;
      font-weight: 400;
      color: #9ca3af;
      letter-spacing: 0.3px;
      vertical-align: baseline;
      margin-left: 6px;
    }

    .btn-editor {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #b91c1c;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 5px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-editor:hover { background: #991b1b; }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 48px 0 40px;
    }
    .hero-title {
      font-size: 2.4rem;
      font-weight: 900;
      color: #b91c1c;
      letter-spacing: -1px;
      line-height: 1;
    }
    .hero-sub {
      font-size: 0.95rem;
      color: #6b7280;
      margin-top: 8px;
    }
    .hero-cta {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #b91c1c;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .hero-cta:hover { background: #991b1b; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .section-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .section-count {
      font-size: 0.65rem;
      color: #d1d5db;
    }

    /* ── Song grid ── */
    .song-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .song-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .song-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }

    .song-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }
    .song-composer {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .song-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }

    .btn-view {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.12s, color 0.12s;
    }
    .btn-view-html {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .btn-view-html:hover { background: #fee2e2; }
    .btn-view-pdf {
      background: #f9fafb;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-view-pdf:hover { background: #f3f4f6; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #d1d5db;
      font-size: 0.85rem;
    }

    /* ── Error ── */
    .load-error {
      text-align: center;
      padding: 40px 0;
      color: #ef4444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">Carnotic <sub>Carnatic Notation Editor</sub></div>
  <a class="btn-editor" href="editor.html">Open Editor ›</a>
</nav>

<main>
  <div class="hero">
    <div class="hero-title">Carnotic</div>
    <div class="hero-sub">A notation editor for Carnatic music — lyrics &amp; sargam, clean &amp; printable.</div>
    <a class="hero-cta" href="editor.html">Open Editor ›</a>
  </div>

  <div class="section-header">
    <span class="section-title">Song Library</span>
    <span class="section-count" id="song-count"></span>
  </div>

  <div class="song-grid" id="song-grid">
    <div class="empty">Loading…</div>
  </div>
</main>

<script>
  fetch('songs/manifest.json')
    .then(r => { if (!r.ok) throw new Error('Failed to load manifest'); return r.json(); })
    .then(data => {
      const songs = data.songs || [];
      const grid = document.getElementById('song-grid');
      const count = document.getElementById('song-count');
      count.textContent = songs.length + (songs.length === 1 ? ' song' : ' songs');

      if (songs.length === 0) {
        grid.innerHTML = '<div class="empty">No songs yet. Create one in the editor.</div>';
        return;
      }

      grid.innerHTML = '';
      songs.forEach(s => {
        const base = 'songs/' + s.folder + '/';
        const card = document.createElement('div');
        card.className = 'song-card';
        card.innerHTML = `
          <div class="song-title">${esc(s.title)}</div>
          <div class="song-composer">${esc(s.composer)}</div>
          <div class="song-actions">
            ${ s.html ? `<a class="btn-view btn-view-html" href="${base}${s.html}" target="_blank">&#9654; Open notation</a>` : '' }
            ${ s.pdf  ? `<a class="btn-view btn-view-pdf"  href="${base}${s.pdf}"  target="_blank">&#8595; PDF</a>` : '' }
          </div>
        `;
        grid.appendChild(card);
      });
    })
    .catch(() => {
      document.getElementById('song-grid').innerHTML =
        '<div class="load-error">Could not load song library.</div>';
    });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
