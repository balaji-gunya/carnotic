<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnotic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e5e7eb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      width: 794px;
      flex-shrink: 0;
      background: #fff;
      box-shadow: 0 4px 32px rgba(0,0,0,0.13);
      border-radius: 4px;
      min-height: 100vh;
      overflow: visible;
      padding-bottom: 56px;
    }

    /* ── Nav ── */
    nav {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 12px 24px;
      height: auto;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #b91c1c;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .brand sub {
      font-size: 0.6rem;
      font-weight: 400;
      color: #9ca3af;
      letter-spacing: 0.3px;
      vertical-align: baseline;
      margin-left: 6px;
    }

    .desktop-hint {
      display: block;
      font-size: 0.55rem;
      font-weight: 400;
      color: #d1d5db;
      letter-spacing: 0.2px;
      margin-top: 5px;
      text-align: center;
    }

    .divider-v {
      width: 1px;
      height: 20px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .meta {
      display: flex;
      gap: 16px;
      flex: 1;
      align-items: center;
    }

    .meta-field {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .meta-field label {
      font-size: 0.58rem;
      color: #9ca3af;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-field input {
      border: none;
      outline: none;
      font-size: 0.78rem;
      color: #374151;
      background: transparent;
      width: 140px;
      border-bottom: 1px solid #e5e7eb;
      padding: 1px 0;
      transition: border-color 0.15s;
    }
    #song-title { width: 280px; font-size: 0.9rem; font-weight: 500; color: #111827; }
    #composer   { width: 200px; font-size: 0.9rem; font-weight: 400; }

    .meta-field input:focus { border-color: #b91c1c; }
    .meta-field input::placeholder { color: #d1d5db; }

    /* ── Scale label (shared) ── */
    .scale-label {
      font-size: 0.58rem;
      color: #9ca3af;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── Scale chips ── */
    .scale-groups-mini {
      display: flex;
      gap: 3px;
      align-items: stretch;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .scale-chip {
      padding: 1px 5px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #fff;
      font-family: 'Times New Roman', Times, serif;
      font-size: 0.72rem; font-weight: 600; color: #9ca3af;
      cursor: pointer;
      transition: all 0.1s;
    }
    .scale-chip:hover               { border-color: #fecaca; color: #b91c1c; background: #fef2f2; }
    .scale-chip.active              { border-color: #b91c1c; color: #b91c1c; background: #fef2f2; }
    .scale-chip-none                { font-family: sans-serif; }
    .scale-chip-none.active         { border-color: #e5e7eb; color: #9ca3af; background: #f3f4f6; }
    #dir-popup {
      position: fixed;
      z-index: 300;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 4px;
      display: none;
      flex-direction: column;
      gap: 2px;
      min-width: 120px;
    }
    .dir-opt {
      display: block;
      width: 100%;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      background: transparent;
      font-size: 0.78rem;
      color: #374151;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .dir-opt:hover { background: #fef2f2; color: #b91c1c; }
    .dir-opt.active { color: #b91c1c; font-weight: 600; }

    .scale-chip { position: relative; }
    .chip-dir {
      position: absolute;
      top: 0; right: 2px;
      font-size: 0.45em;
      font-family: sans-serif;
      line-height: 1.2;
      color: #b91c1c;
      pointer-events: none;
    }

    /* ── Raga-Tala block (inline scale rows) ── */
    .scale-block {
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      flex: 1;
      min-width: 0;
      padding: 6px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .sb-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sb-row {
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 6px 0;
    }
    .sb-field {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .sb-row .sb-field:first-child .scale-label { min-width: 2.5rem; }
    .sb-row .sb-field:last-child .scale-label  { min-width: 5.5rem; }


    /* ── Inline scale row ── */
    .scale-row .scale-row-content {
      flex: 1;
      min-width: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      border-top: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      border-radius: 0 6px 6px 0;
      overflow: hidden;
    }
    .scale-row .scale-row-content .scale-block {
      border-top: none;
      border-bottom: none;
    }
    .scale-row .row-label {
      color: #b91c1c;
      font-size: 0.58rem;
    }

    .sb-sep { display: flex; align-items: center; gap: 6px; }
    .sb-sep-line { flex: 1; height: 1px; background: #e5e7eb; }
    .raga-toggle {
      font-size: 0.6rem; font-family: inherit; font-weight: 500;
      color: #9ca3af; border: 1px solid #e5e7eb; background: #f9fafb;
      border-radius: 3px; padding: 1px 6px; cursor: pointer; flex-shrink: 0;
      transition: color 0.1s, border-color 0.1s;
    }
    .raga-toggle:hover { color: #b91c1c; border-color: #b91c1c; }
    .raga-section.collapsed { display: none; }
    .scale-beats-wrap {
      position: relative;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      flex-shrink: 0;
    }
    .scale-beats-input {
      width: 110px;
      border: none;
      border-bottom: 1px solid #e5e7eb;
      border-radius: 0;
      background: transparent;
      padding: 1px 0;
      font-size: 0.78rem;
      font-weight: 400;
      color: #374151;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .scale-beats-input:focus { border-color: #b91c1c; }
    .scale-beats-input::placeholder { color: #d1d5db; }

    .beats-tooltip {
      font-size: 0.55rem;
      font-weight: 700;
      color: #9ca3af;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 50%;
      width: 13px;
      height: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      flex-shrink: 0;
      position: relative;
    }
    .beats-tooltip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #f9fafb;
      font-size: 0.65rem;
      font-weight: 400;
      white-space: pre;
      padding: 6px 10px;
      border-radius: 6px;
      line-height: 1.7;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .beats-tooltip:hover::after { opacity: 1; }

    .raga-field-input {
      font-family: 'Times New Roman', Times, serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #b91c1c;
      background: transparent;
      border-bottom: 1px solid #e5e7eb;
      padding: 2px 4px;
      flex: 1;
      min-width: 0;
      outline: none;
      white-space: nowrap;
      overflow: hidden;
      min-height: 1.4em;
      transition: border-color 0.15s;
    }
    .raga-field-input:focus { border-color: #b91c1c; }
    .raga-field-input .stok { text-decoration: none !important; cursor: text; }
    .raga-field-input .stok::before { display: none !important; }
    .raga-field-input:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      font-weight: 400;
      font-size: 0.78rem;
      pointer-events: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar label {
      font-size: 0.78rem;
      color: #6b7280;
      font-weight: 500;
      white-space: nowrap;
    }


    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #b91c1c; color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn-ghost:hover { background: #f3f4f6; opacity: 1; }

    /* ── Footer ── */
    #footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 794px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      z-index: 10;
    }

    @media print { #footer { display: none !important; } }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    .empty-box { text-align: center; }
    .empty-icon { font-size: 2.5rem; color: #d1d5db; margin-bottom: 12px; }
    .empty-title { font-size: 1rem; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
    .empty-sub { font-size: 0.82rem; color: #9ca3af; line-height: 1.6; }

    /* ── Grid area ── */
    #grid-area {
      display: none;
      padding: 20px 24px;
    }

    #grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    /* ── Row ── */
    .grid-row {
      display: flex;
      align-items: stretch;
    }

    .row-label {
      width: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      color: #9ca3af;
      font-weight: 700;
      border: 1px solid #e5e7eb;
      border-right: none;
      background: #f9fafb;
      border-radius: 6px 0 0 6px;
    }

    .cells { display: flex; flex-wrap: wrap; row-gap: 6px; flex: 1; min-width: 0; }

    /* ── Cell ── */
    .cell {
      flex: 1;
      min-width: 0;
      min-height: 70px;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      border-left: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      background: #fff;
      position: relative;
    }

    .cell:last-child {
      border-right: 1px solid #e5e7eb;
      border-radius: 0 6px 6px 0;
    }

    .beat-num {
      height: 10px;
      line-height: 10px;
      text-align: right;
      padding-right: 4px;
      font-size: 0.45rem;
      color: #d1d5db;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
      pointer-events: none;
    }

    .cell-lyric,
    .cell-note {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      outline: none;
      padding: 2px 6px;
      user-select: text;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      overflow: hidden;
    }

    .cell-lyric {
      flex: 0 0 28px;
      font-size: 15px;
      font-family: 'Times New Roman', Times, serif;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }

    .cell-lyric:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      font-style: normal;
      font-size: 12px;
      pointer-events: none;
    }

    .cell-note {
      flex: 1;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      font-weight: 700;
      color: #b91c1c;
      caret-color: #b91c1c;
      padding-top: 14px;
      padding-bottom: 8px;
    }

    .cell-note sub {
      font-size: 0.6em;
      vertical-align: -0.35em;
      line-height: 0;
      color: inherit;
    }


    .cell-note:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      font-weight: 400;
      font-family: inherit;
      font-size: 12px;
      pointer-events: none;
    }

    .cell.group-start {
      border-left: 2px solid #9ca3af;
    }

    /* ── Row actions (⋮ dropdown) ── */
    .row-menu-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .row-menu-btn {
      width: 28px;
      height: 28px;
      margin-left: 6px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      color: #9ca3af;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .row-menu-btn:hover { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
    .row-dropdown {
      position: fixed;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 4px;
      min-width: 165px;
      z-index: 1000;
      display: none;
    }
    .row-dropdown.open { display: block; }
    .drop-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 0.78rem;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }
    .drop-item:hover { background: #f3f4f6; }
    .drop-item.danger { color: #b91c1c; }
    .drop-item.danger:hover { background: #fef2f2; }
    .drop-item.success { color: #16a34a; }
    .drop-item.success:hover { background: #f0fdf4; }
    .drop-divider { height: 1px; background: #f3f4f6; margin: 3px 0; }
    .drop-icon { width: 16px; text-align: center; font-size: 0.85rem; }

    /* ── Add row / heading triggers ── */
    #add-triggers {
      display: flex;
      flex-direction: row;
      gap: 4px;
      margin-top: 16px;
      justify-content: center;
    }

    #add-row-trigger, #add-heading-trigger, #add-scale-trigger, #add-note-trigger {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      color: #b91c1c;
      background: transparent;
      transition: background 0.15s;
    }

    #add-row-trigger:hover, #add-heading-trigger:hover, #add-scale-trigger:hover, #add-note-trigger:hover { background: #fef2f2; }

    /* ── Heading row ── */
    .heading-row { margin: 10px 0 2px; }
    .note-row { margin: 4px 0; }
    .note-wrap {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 6px;
      border: 1px solid #e5e7eb;
      border-left: none;
      border-right: none;
      background: #fff;
      padding: 5px 12px;
    }
    .note-prefix {
      font-size: 0.75rem;
      font-weight: 500;
      color: #9ca3af;
      flex-shrink: 0;
    }
    .note-text {
      flex: 1;
      outline: none;
      font-size: 0.82rem;
      color: #374151;
      line-height: 1.6;
    }
    .note-text:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      font-style: italic;
      pointer-events: none;
    }
    .note-row .row-label {
      border-radius: 6px 0 0 6px;
      color: #9ca3af;
      font-size: 0.5rem;
      letter-spacing: 0.04em;
    }

    .heading-text {
      flex: 1;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #b91c1c;
      outline: none;
      border: 1px solid #e5e7eb;
      border-left: none;
      border-right: none;
      background: #f9fafb;
      white-space: nowrap;
      overflow: hidden;
      line-height: 1.6;
    }
    .heading-text:empty::before {
      content: attr(data-ph);
      color: #d1d5db;
      font-weight: 400;
      font-style: italic;
      font-size: 0.85rem;
      pointer-events: none;
    }
    .heading-row .row-label {
      border-radius: 6px 0 0 6px;
      color: #b91c1c;
      font-size: 0.5rem;
      letter-spacing: 0.04em;
    }


    /* ── Swara Picker Popup ── */
    #swara-popup {
      position: fixed;
      z-index: 200;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.14);
      padding: 10px 12px 12px;
      display: none;
    }

    .swara-popup-title {
      font-size: 0.65rem;
      color: #9ca3af;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .swara-popup-grid {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      gap: 4px;
    }

    .swara-col-hdr {
      font-size: 0.58rem;
      color: #9ca3af;
      font-weight: 600;
      text-align: center;
      padding-bottom: 2px;
    }

    .swara-opt {
      height: 38px;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      font-family: 'Times New Roman', Times, serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #b91c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }

    .swara-opt:hover { background: #fef2f2; border-color: #fecaca; }
    .swara-opt.active { background: #fef2f2; border-color: #b91c1c; box-shadow: 0 0 0 2px #fecaca; }
    .swara-opt sub { font-size: 0.6em; vertical-align: -0.35em; line-height: 0; }

    .stok { border-radius: 2px; padding: 0 1px; cursor: pointer; transition: background 0.1s; position: relative; }
    .stok:hover { background: #fef2f2; }
    .stok-sel { background: #fecaca !important; outline: 1px solid #f87171; }
    .stok-pending { opacity: 0.45; }
    .stok[data-speed="2"] { text-decoration: underline; text-decoration-color: #b91c1c; text-decoration-thickness: 1.5px; text-underline-offset: 0.35em; }
    .stok[data-speed="4"] { text-decoration: underline double; text-decoration-color: #b91c1c; text-underline-offset: 0.35em; }
    .stok[data-speed="3"] { text-decoration: underline dotted; text-decoration-color: #b91c1c; text-decoration-thickness: 1.5px; text-underline-offset: 0.35em; }
    .stok[data-gamaka="wave"]::before,
    .stok[data-gamaka="slide"]::before {
      content: ""; /* overridden per type below */
      position: absolute; top: -14px; left: 0; right: 0;
      text-align: center; color: #b91c1c;
      font-size: 1.1em; font-weight: normal; line-height: 1;
      pointer-events: none; font-style: normal; text-decoration: none;
    }
    .stok[data-gamaka="wave"]::before  { content: "\223F"; } /* ∿ */
    .stok[data-gamaka="slide"]::before { content: "\2192"; font-size: 0.65em; top: -9px; } /* → */
    .gamaka-row { display: flex; justify-content: center; gap: 4px; margin-top: 6px; }
    .gamaka-btn { padding: 3px 16px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff;
      font-size: 0.7rem; font-weight: 600; color: #9ca3af; cursor: pointer; font-family: inherit; transition: all 0.1s; }
    .gamaka-btn.active { border-color: #b91c1c; color: #b91c1c; background: #fef2f2; }

    .speed-row { display: flex; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f3f4f6; justify-content: center; }
    .speed-btn { padding: 3px 12px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff;
      font-size: 0.7rem; font-weight: 600; color: #9ca3af; cursor: pointer;
      font-family: inherit; transition: all 0.1s; }
    .speed-btn.active { border-color: #b91c1c; color: #b91c1c; background: #fef2f2; }

    /* ── Print ── */
    :root { --print-date: ''; }

    @page {
      size: A4 portrait;
      margin: 1cm 1.5cm 2cm;
      @bottom-left {
        content: var(--print-date);
        font-family: 'Times New Roman', Times, serif;
        font-size: 8pt;
        color: #555;
      }
      @bottom-right {
        content: "Page " counter(page);
        font-family: 'Times New Roman', Times, serif;
        font-size: 8pt;
        color: #555;
      }
    }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      nav .btn, .row-menu-wrap, #add-triggers, .desktop-hint { display: none !important; }
      nav { position: static; border: none; box-shadow: none; }
      body { background: #fff; display: block; }
      .page { width: 100%; box-shadow: none; border: none; border-radius: 0; min-height: auto; padding-bottom: 0; }
      #grid-area { display: block !important; overflow: visible; padding: 12px; }
      .grid-row { break-inside: avoid; page-break-inside: avoid; }
      .cells { break-inside: avoid; page-break-inside: avoid; }
      .cell { break-inside: avoid; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Nav -->
  <nav>
    <div class="brand">Carnotic <sub>Carnatic Notation Editor</sub><span class="desktop-hint">Laptop/PC only · Not supported on mobile</span></div>
    <div class="divider-v"></div>
    <div class="meta">
      <div class="meta-field">
        <label>Title</label>
        <input type="text" id="song-title" placeholder="" spellcheck="false">
      </div>
      <div class="meta-field">
        <label>Composer</label>
        <input type="text" id="composer" placeholder="" spellcheck="false">
      </div>
    </div>
  </nav>


  <!-- Empty state -->
  <div id="empty-state">
    <div class="empty-box">
      <div class="empty-icon">♩</div>
      <p class="empty-title">No sheet yet</p>
      <p class="empty-sub">Add a row to begin.<br>Set beats next to Tala (default: 4).</p>
      <div id="add-triggers">
        <div id="add-row-trigger" onclick="addRowAtEnd()">＋ Add avarthanam</div>
        <div id="add-heading-trigger" onclick="addHeadingAtEnd()">＋ Add heading</div>
        <div id="add-scale-trigger" onclick="addScaleAtEnd()">＋ Add raga & tala</div>
        <div id="add-note-trigger" onclick="addNoteAtEnd()">＋ Add remarks</div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div id="grid-area" style="display:block">
    <div id="grid"></div>
  </div>


  <!-- Footer -->
  <div id="footer">
    <button class="btn btn-ghost" onclick="restart()">↺ Restart</button>
    <button class="btn btn-primary" id="download-btn" onclick="downloadPDF()" style="display:none">⬇ Download PDF</button>
    <button class="btn btn-ghost" id="export-btn" onclick="exportProject()" style="display:none">💾 Save .html</button>
  </div>

</div><!-- .page -->

  <!-- Direction Popup -->
  <div id="dir-popup">
    <button class="dir-opt" data-dir="up">↑ Ascending</button>
    <button class="dir-opt" data-dir="both">↑↓ Both</button>
    <button class="dir-opt" data-dir="down">↓ Descending</button>
  </div>

  <!-- Swara Picker Popup -->
  <div id="swara-popup">
    <div class="swara-popup-title" id="swara-popup-title"></div>
    <div class="swara-popup-grid" id="swara-popup-grid"></div>
    <div class="speed-row">
      <button class="speed-btn active" data-speed="0">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
      <button class="speed-btn" data-speed="3">Tisra</button>
    </div>
    <div class="gamaka-row">
      <button class="gamaka-btn" data-gamaka="wave">∿ Wave</button>
      <button class="gamaka-btn" data-gamaka="slide">→ Slide</button>
    </div>
  </div>

  <script>
    let beats = 0;
    let groups = [];
    let segments = []; // e.g. [[4],[2,2]] for "4/2+2"
    let rowCount = 0;
    let focusedInput = null;
    let clipboard = null;
    let activePopupCell = null;
    let pendingSwara    = null;
    let popupFocusIdx   = 0;
    let popupOptions    = [];
    let pendingTokenEl  = null;
    let editingTokenEl  = null;
    let pendingSpeed    = 0;
    let pendingGamaka   = '';
    let selectedTokens  = [];

    function clearTokenSelection() {
      selectedTokens.forEach(t => t.classList.remove('stok-sel'));
      selectedTokens = [];
    }


    let _ruler = null;

    function _measureFont(el, maxSize) {
      const floor = Math.round(maxSize * 0.75);
      const text  = el.textContent;
      if (!text) { el.style.fontSize = ''; return; }
      if (!_ruler) {
        _ruler = document.createElement('span');
        _ruler.style.cssText = 'position:absolute;top:-9999px;left:-9999px;white-space:nowrap;visibility:hidden;pointer-events:none;';
        document.body.appendChild(_ruler);
      }
      const cs = getComputedStyle(el);
      _ruler.style.fontFamily = cs.fontFamily;
      _ruler.style.fontWeight = cs.fontWeight;
      _ruler.textContent = text;
      const available = el.clientWidth - 12;
      let size = maxSize;
      _ruler.style.fontSize = size + 'px';
      while (_ruler.scrollWidth > available && size > floor) {
        size--;
        _ruler.style.fontSize = size + 'px';
      }
      el.style.fontSize = size === maxSize ? '' : size + 'px';
    }

    function fitCell(anyChildEl) {
      const cellDiv = anyChildEl.closest('.cell');
      const lyricEl = cellDiv.querySelector('.cell-lyric');
      const noteEl  = cellDiv.querySelector('.cell-note');
      if (lyricEl) _measureFont(lyricEl, 15);
      if (noteEl)  _measureFont(noteEl,  14);
    }

    document.addEventListener('focusin', e => {
      if (e.target.matches('.cell-lyric, .cell-note')) focusedInput = e.target;
    });

    // Multi-token selection: drag across swaras then hit a speed/gamaka button
    document.addEventListener('mouseup', e => {
      const cell = e.target.closest?.('.cell-note');
      if (!cell) return;
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
      const range = sel.getRangeAt(0);
      const tokens = [...cell.querySelectorAll('.stok')].filter(
        t => !t.classList.contains('stok-pending') && range.intersectsNode(t)
      );
      if (tokens.length < 2) return;
      clearTokenSelection();
      selectedTokens = tokens;
      tokens.forEach(t => t.classList.add('stok-sel'));
      sel.removeAllRanges();
    });

    document.addEventListener('mousedown', e => {
      if (!e.target.closest('.speed-btn, .gamaka-btn, .stok-sel, .stok')) {
        clearTokenSelection();
      }
    });

    // ── Setup ──────────────────────────────────────────────

    function parseBeatsInput(str) {
      const segs = str.trim().split('/').map(seg => {
        const parts = seg.trim().split('+').map(p => parseInt(p.trim()));
        if (parts.some(isNaN) || parts.some(p => p < 1)) return null;
        return parts;
      });
      if (segs.some(s => s === null)) return null;
      const allGroups = segs.flat();
      const total = allGroups.reduce((a, b) => a + b, 0);
      if (total < 1 || total > 64) return null;
      return { beats: total, groups: allGroups, segments: segs };
    }

    function getGroupStarts() {
      const starts = new Set();
      let pos = 1;
      for (const g of groups) { starts.add(pos); pos += g; }
      return starts;
    }

    // Beat numbers where a forced line-wrap should occur (start of each segment except first)
    function getWrapBeats() {
      const wraps = new Set();
      let pos = 1;
      for (let i = 0; i < segments.length - 1; i++) {
        pos += segments[i].reduce((a, b) => a + b, 0);
        wraps.add(pos);
      }
      return wraps;
    }

    function showGrid() {
      document.getElementById('download-btn').style.display = 'flex';
      document.getElementById('export-btn').style.display = 'flex';
      document.getElementById('grid-area').appendChild(document.getElementById('add-triggers'));
      document.getElementById('empty-state').style.display = 'none';
    }

    function lazyInit() {
      if (beats > 0) return;
      beats = 4; groups = [4]; segments = [[4]];
      showGrid();
    }

    function restart() {
      if (beats > 0 && !confirm('This will clear all notation. Continue?')) return;
      beats = 0; groups = []; segments = []; rowCount = 0; focusedInput = null; clipboard = null;

      document.getElementById('grid').innerHTML = '';
      document.getElementById('download-btn').style.display = 'none';
      document.getElementById('export-btn').style.display = 'none';
      document.querySelector('.empty-box').appendChild(document.getElementById('add-triggers'));
      document.getElementById('empty-state').style.display = 'flex';

      // Re-add one default scale row
      document.getElementById('grid').appendChild(makeScaleRow());
      showGrid();
      renumber();
    }

    // ── Row building ────────────────────────────────────────

    function getBeatsForPosition(refRow) {
      let el = refRow;
      while (el) {
        if (el.classList && el.classList.contains('scale-row')) {
          const inp = el.querySelector('.scale-beats-input');
          if (inp && inp.value.trim()) {
            const parsed = parseBeatsInput(inp.value.trim());
            if (parsed) return parsed;
          }
        }
        el = el.previousElementSibling;
      }
      return { beats, groups, segments };
    }

    function buildRow(cfg) {
      const b_ = cfg ? cfg.beats    : beats;
      const g_ = cfg ? cfg.groups   : groups;
      const s_ = cfg ? cfg.segments : segments;

      function localGroupStarts() {
        const starts = new Set(); let pos = 1;
        for (const g of g_) { starts.add(pos); pos += g; }
        return starts;
      }
      function localWrapBeats() {
        const wraps = new Set(); let pos = 1;
        for (let i = 0; i < s_.length - 1; i++) { pos += s_[i].reduce((a,b)=>a+b,0); wraps.add(pos); }
        return wraps;
      }

      const row = document.createElement('div');
      row.className = 'grid-row';

      const label = document.createElement('div');
      label.className = 'row-label';
      label.textContent = '–';
      row.appendChild(label);

      const cellsWrap = document.createElement('div');
      cellsWrap.className = 'cells';

      const groupStarts = localGroupStarts();
      const wrapBeats  = localWrapBeats();
      for (let b = 1; b <= b_; b++) {
        if (wrapBeats.has(b)) {
          const br = document.createElement('div');
          br.style.cssText = 'width:100%;height:0;flex-basis:100%;';
          cellsWrap.appendChild(br);
        }
        const cell = document.createElement('div');
        const cls = ['cell'];
        if (b === 1) cls.push('sam');
        if (b > 1 && groupStarts.has(b)) cls.push('group-start');
        cell.className = cls.join(' ');

        const beatNum = document.createElement('span');
        beatNum.className = 'beat-num';
        beatNum.textContent = b;
        cell.appendChild(beatNum);

        cell.appendChild(makeInput('cell-lyric', b === 1 ? 'Lyric' : '·', b));
        cell.appendChild(makeInput('cell-note',  b === 1 ? 'Swara' : '–', b));
        cellsWrap.appendChild(cell);
      }

      row.appendChild(cellsWrap);
      row.appendChild(makeRowActions(row));
      return row;
    }

    const scaleDefaults  = { R: null, G: null, M: null, D: null, N: null };
    const scalePresence  = { S: true, P: true };
    const scaleDirection = {}; // letter → null (both) | 'up' (↑) | 'down' (↓)

    const DIGIT_KEYS    = new Set(['0','1','2','3']);
    const SWARA_LETTERS = new Set(['S','R','G','M','P','D','N']);
    const NOTE_SYMBOLS  = new Set([',',';','-',' ']);
    const SUB_UNICODE   = {'₀':'0','₁':'1','₂':'2','₃':'3'};
    const SUB_DIGITS    = {'0':'₀','1':'₁','2':'₂','3':'₃'};

    function noteToHTML(text) {
      return text.replace(/[₀₁₂₃]/g, c => '<sub>' + SUB_UNICODE[c] + '</sub>');
    }

    const SWARA_DIGITS = {
      S: [],         R: ['1','2','3'], G: ['0','1','2'],
      M: ['1','2'],  P: [],           D: ['1','2','3'], N: ['0','1','2'],
    };
    const OCTAVE_DEFS = [
      { label: 'Mand ↓',  dot: '̣' },
      { label: 'Middle',  dot: '' },
      { label: 'Taar ↑',  dot: '̇' },
    ];

    function buildSwaraText(letter, dot, digit) {
      return digit ? (letter + dot + (SUB_DIGITS[digit] || digit)) : (letter + dot);
    }

    function syncPopupMarkings() {
      pendingSpeed = editingTokenEl ? (parseInt(editingTokenEl.dataset.speed) || 0) : 0;
      document.querySelectorAll('.speed-btn').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.speed) === pendingSpeed)
      );
      pendingGamaka = editingTokenEl?.dataset?.gamaka || '';
      document.querySelectorAll('.gamaka-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.gamaka === pendingGamaka)
      );
    }

    function showSwaraPopup(letter, anchorEl) {
      activePopupCell = anchorEl;
      pendingSwara    = letter;
      popupFocusIdx   = 0;
      popupOptions    = [];

      const digits = SWARA_DIGITS[letter] || [];
      const rowDigits = ['', ...digits];
      const popup     = document.getElementById('swara-popup');
      const grid      = document.getElementById('swara-popup-grid');

      document.getElementById('swara-popup-title').textContent = letter + ' variants';
      document.getElementById('swara-popup-grid').style.display = '';
      grid.innerHTML = '';

      OCTAVE_DEFS.forEach(({ label }) => {
        const h = document.createElement('div');
        h.className = 'swara-col-hdr';
        h.textContent = label;
        grid.appendChild(h);
      });

      rowDigits.forEach(digit => {
        OCTAVE_DEFS.forEach(({ dot }) => {
          const text = buildSwaraText(letter, dot, digit);
          const btn  = document.createElement('button');
          btn.className = 'swara-opt';
          btn.textContent = text;
          btn.addEventListener('mousedown', e => e.preventDefault());
          btn.addEventListener('click', () => selectSwaraOption(text));
          grid.appendChild(btn);
          popupOptions.push({ html: text, el: btn });
        });
      });

      popupFocusIdx = 1; // always start on plain (unnumbered) middle-octave variant
      updatePopupFocus();

      const rect = (anchorEl.closest('.cell') || anchorEl).getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom - 4 - 145;
      popup.style.left = Math.max(4, Math.min(rect.left, window.innerWidth - 180)) + 'px';
      if (spaceBelow > 60) {
        popup.style.top = (rect.bottom + 4) + 'px'; popup.style.bottom = 'auto';
      } else {
        popup.style.top = 'auto'; popup.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
      }
      syncPopupMarkings();
      popup.style.display = 'block';
    }

    function showSpeedPopup(anchorEl) {
      const popup = document.getElementById('swara-popup');
      document.getElementById('swara-popup-title').textContent = 'Speed';
      document.getElementById('swara-popup-grid').style.display = 'none';
      popupOptions = []; popupFocusIdx = 0;

      syncPopupMarkings();

      const rect = (anchorEl.closest('.cell') || anchorEl).getBoundingClientRect();
      popup.style.left = Math.max(4, Math.min(rect.left, window.innerWidth - 180)) + 'px';
      const spaceBelow = window.innerHeight - rect.bottom - 4;
      if (spaceBelow > 60) {
        popup.style.top = (rect.bottom + 4) + 'px'; popup.style.bottom = 'auto';
      } else {
        popup.style.top = 'auto'; popup.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
      }
      popup.style.display = 'block';
    }

    function updatePopupFocus() {
      popupOptions.forEach((o, i) => o.el.classList.toggle('active', i === popupFocusIdx));
    }

    function movePopupFocus(delta) {
      popupFocusIdx = Math.max(0, Math.min(popupOptions.length - 1, popupFocusIdx + delta));
      updatePopupFocus();
    }

    function selectFocusedOption() {
      const opt = popupOptions[popupFocusIdx];
      if (opt) selectSwaraOption(opt.html);
    }

    function selectSwaraOption(text) {
      const speed   = pendingSpeed;
      const gamaka  = pendingGamaka;
      const pending = pendingTokenEl;
      const editing = editingTokenEl;
      const cell    = activePopupCell || focusedInput;
      pendingTokenEl = null; editingTokenEl = null;
      closePopup(false);
      if (!cell) return;
      cell.focus();
      if (pending) {
        pending.textContent    = text;
        pending.dataset.speed  = String(speed);
        if (gamaka) pending.dataset.gamaka = gamaka; else delete pending.dataset.gamaka;
        pending.classList.remove('stok-pending');
        placeCaretAfterToken(pending);
      } else if (editing) {
        editing.textContent   = text;
        editing.dataset.speed = String(speed);
        if (gamaka) editing.dataset.gamaka = gamaka; else delete editing.dataset.gamaka;
        placeCaretAfterToken(editing);
      }
    }

    function placeCaretAfterToken(span) {
      const r = document.createRange();
      r.setStartAfter(span); r.collapse(true);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
    }

    function closePopup(keepLetter) {
      document.getElementById('swara-popup').style.display = 'none';
      if (pendingTokenEl) {
        if (keepLetter) {
          pendingTokenEl.classList.remove('stok-pending');
        } else {
          pendingTokenEl.remove();
        }
      }
      pendingTokenEl = null; editingTokenEl = null; pendingSpeed = 0; pendingGamaka = '';
      activePopupCell = null; pendingSwara = null; popupFocusIdx = 0; popupOptions = [];
    }

    function tryInsertDigit(digit, cell) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (!cell.contains(range.startContainer)) return;

      const preRange = document.createRange();
      preRange.setStart(cell, 0);
      preRange.setEnd(range.startContainer, range.startOffset);
      const before = preRange.toString();
      if (!before) return;

      let i = before.length - 1;
      if (SUB_UNICODE[before[i]]) return; // already has a subscript here

      const COMBINING = new Set(['̇', '̣']);
      while (i >= 0 && COMBINING.has(before[i])) i--;
      if (i < 0) return;

      const swara = before[i];
      if (!SWARA_LETTERS.has(swara)) return;

      const validDigits = SWARA_DIGITS[swara] || [];
      if (!validDigits.includes(digit)) return;

      document.execCommand('insertText', false, SUB_DIGITS[digit]);
    }

    function insertSwaraToken(text, speed, isPending, cell) {
      const span = document.createElement('span');
      span.className = 'stok' + (isPending ? ' stok-pending' : '');
      // no contentEditable=false — keeps cursor visible between spans
      span.dataset.speed = String(speed);
      span.textContent = text;
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        // If cursor landed inside a .stok span (e.g. after clicking back into cell),
        // move it after that span so new token becomes a sibling, not a nested child.
        const host = range.startContainer.nodeType === 3
          ? range.startContainer.parentElement
          : range.startContainer;
        const enclosing = host?.closest?.('.stok');
        if (enclosing && cell.contains(enclosing)) {
          const atStart = range.startContainer.nodeType === 3 && range.startOffset === 0;
          if (atStart) range.setStartBefore(enclosing);
          else range.setStartAfter(enclosing);
          range.collapse(true);
        }
        range.deleteContents();
        range.insertNode(span);
      } else {
        cell.appendChild(span);
      }
      const r = document.createRange();
      r.setStartAfter(span); r.collapse(true);
      sel.removeAllRanges(); sel.addRange(r);
      return span;
    }

    document.addEventListener('mousedown', e => {
      if (!activePopupCell) return;
      if (!document.getElementById('swara-popup').contains(e.target)) closePopup(false);
    });

    function makeInput(cls, placeholder, beat) {
      const el = document.createElement('div');
      el.className = cls;
      el.contentEditable = 'true';
      el.spellcheck = false;
      el.dataset.ph = placeholder;
      el.dataset.beat = beat;
      el.addEventListener('keydown', handleNav);
      if (cls === 'cell-note') {
        el.addEventListener('input', () => {
          const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
          let node;
          while ((node = walker.nextNode())) {
            if (node.nodeValue.includes('.')) {
              const sel = window.getSelection();
              const range = sel.rangeCount ? sel.getRangeAt(0) : null;
              const wasInNode = range && range.startContainer === node;
              const offsetBefore = wasInNode ? range.startOffset : 0;
              const dotsBefore = (node.nodeValue.slice(0, offsetBefore).match(/\./g) || []).length;
              node.nodeValue = node.nodeValue.replace(/\./g, '');
              if (wasInNode) {
                const r = document.createRange();
                r.setStart(node, Math.max(0, offsetBefore - dotsBefore));
                r.collapse(true);
                sel.removeAllRanges();
                sel.addRange(r);
              }
            }
          }
        });
        attachTokenClickHandler(el, true);
        el.addEventListener('input', () => { if (!el.textContent) el.innerHTML = ''; fitCell(el); });
        el.addEventListener('keydown', e => {
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          // Delete whole span atomically when caret is inside or right after one
          if (e.key === 'Backspace' || e.key === 'Delete') {
            const sel = window.getSelection();
            if (sel?.rangeCount) {
              // Non-collapsed selection (e.g. Cmd+A → Backspace): wipe everything in range
              if (!sel.isCollapsed) {
                e.preventDefault();
                const range = sel.getRangeAt(0);
                el.querySelectorAll('.stok').forEach(s => {
                  if (range.intersectsNode(s)) s.remove();
                });
                range.deleteContents();
                fitCell(el);
                return;
              }
              const { startContainer, startOffset } = sel.getRangeAt(0);
              // Cursor inside a span?
              const spanInside = (startContainer.nodeType === 3
                ? startContainer.parentElement
                : startContainer)?.closest?.('.stok');
              if (spanInside) { e.preventDefault(); spanInside.remove(); fitCell(el); return; }
              // Cursor right before a span (Delete) or right after a span (Backspace)?
              let adjSpan = null;
              if (e.key === 'Backspace') {
                adjSpan = startContainer.nodeType === 3 && startOffset === 0
                  ? startContainer.previousSibling
                  : startContainer === el ? el.childNodes[startOffset - 1] : null;
              } else {
                adjSpan = startContainer.nodeType === 3 && startOffset === startContainer.textContent.length
                  ? startContainer.nextSibling
                  : startContainer === el ? el.childNodes[startOffset] : null;
              }
              if (adjSpan?.classList?.contains('stok')) {
                e.preventDefault(); adjSpan.remove(); fitCell(el); return;
              }
            }
          }
          if (e.key.length > 1) return;
          e.preventDefault();
          if (SWARA_LETTERS.has(e.key.toUpperCase())) {
            const letter = e.key.toUpperCase();
            const def    = scaleDefaults[letter];
            const isUpper = e.key === e.key.toUpperCase();
            if (!isUpper) {
              pendingTokenEl = insertSwaraToken(letter, 0, false, el);
            } else if (!e.shiftKey && def !== null && def !== undefined) {
              pendingTokenEl = insertSwaraToken(buildSwaraText(letter, '', def), 0, false, el);
            } else {
              pendingTokenEl = insertSwaraToken(letter, 0, true, el);
              showSwaraPopup(letter, e.target);
            }
          } else if (NOTE_SYMBOLS.has(e.key)) {
            if (e.key === ',' || e.key === ';') {
              insertSwaraToken(e.key, 0, false, el);
            } else {
              document.execCommand('insertText', false, e.key);
            }
          } else if (DIGIT_KEYS.has(e.key)) {
            tryInsertDigit(e.key, e.target);
          }
        });
        el.addEventListener('paste', e => {
          e.preventDefault();
          const raw = e.clipboardData.getData('text/plain');
          let out = '';
          for (const ch of raw) {
            if (SWARA_LETTERS.has(ch.toUpperCase())) out += ch.toUpperCase();
            else if (NOTE_SYMBOLS.has(ch)) out += ch;
            else if (SUB_UNICODE[ch]) out += ch;
          }
          if (out) document.execCommand('insertText', false, out);
        });
      } else {
        el.addEventListener('input', () => { if (!el.textContent) el.innerHTML = ''; fitCell(el); });
        el.addEventListener('paste', e => {
          e.preventDefault();
          const text = e.clipboardData.getData('text/plain');
          document.execCommand('insertText', false, text);
        });
      }
      return el;
    }

    function buildDropdown(items) {
      const dropdown = document.createElement('div');

      items.forEach(item => {

          divider.className = 'drop-divider';

        }
        const el = document.createElement('div');
        el.className = 'drop-item' + (item.cls ? ' ' + item.cls : '');
        const icon = document.createElement('span');
        icon.className = 'drop-icon';
        icon.textContent = item.icon;
        el.appendChild(icon);

        el.addEventListener('click', () => { closeAllDropdowns(); item.fn(); });

    function makeMenuWrap(items) {
      const wrap = document.createElement('div');
      wrap.className = 'row-menu-wrap';
      const btn = document.createElement('button');
      btn.className = 'row-menu-btn';
      btn.textContent = '⋮';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const dd = wrap.querySelector('.row-dropdown');
        const wasOpen = dd.classList.contains('open');
        closeAllDropdowns();
        if (!wasOpen) {
          const rect = btn.getBoundingClientRect();
          dd.style.right = (window.innerWidth - rect.right) + 'px';
          dd.style.left = 'auto';
          dd.style.bottom = 'auto';
          dd.classList.add('open');
          // flip up if not enough space below
          const ddH = dd.offsetHeight;
          if (rect.bottom + ddH + 8 > window.innerHeight) {
            dd.style.top = 'auto';
            dd.style.bottom = (window.innerHeight - rect.top) + 'px';
          } else {
            dd.style.top = rect.top + 'px';
          }
        }
      });
      wrap.appendChild(btn);
      wrap.appendChild(buildDropdown(items));
      return wrap;
    }

    function normalizeRowWidths() {
      // Find the max number of cells in any single visual line (between flex-breaks)
      let maxPerLine = 0;
      document.querySelectorAll('.grid-row:not(.heading-row):not(.scale-row) .cells').forEach(cellsDiv => {
        let lineCount = 0;
        for (const child of cellsDiv.children) {
          if (child.classList.contains('cell')) {
            lineCount++;
          } else {
            maxPerLine = Math.max(maxPerLine, lineCount);
            lineCount = 0;
          }
        }
        maxPerLine = Math.max(maxPerLine, lineCount);
      });
      if (maxPerLine === 0) return;
      const pct = (100 / maxPerLine).toFixed(4) + '%';
      document.querySelectorAll('.grid-row:not(.heading-row):not(.scale-row) .cells .cell').forEach(cell => {
        cell.style.flex = `0 0 ${pct}`;
        cell.style.maxWidth = pct;

        row.querySelectorAll('.cell-lyric, .cell-note').forEach(el => el.dataset.row = num);

    // ── Keyboard navigation ─────────────────────────────────

    function caretAtStart(el) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return true;
      const range = sel.getRangeAt(0);
      return (range.startOffset === 0 && range.startContainer === el) || el.textContent.length === 0;
    }

    function caretAtEnd(el) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return true;
      const range = sel.getRangeAt(0);
      const len = el.textContent.length;
      return range.endOffset === len || len === 0;
    }

    // Shared: handle keydown events when swara popup is open. Returns true if consumed.
    function handlePopupKeydown(e) {
      if (!activePopupCell || e.target !== activePopupCell) return false;
      const cols = OCTAVE_DEFS.length;
      switch (e.key) {
        case 'Escape':    e.preventDefault(); closePopup(true);          return true;
        case 'Enter':
        case 'Tab':       e.preventDefault(); selectFocusedOption();     return true;
        case 'ArrowRight':e.preventDefault(); movePopupFocus(1);         return true;
        case 'ArrowLeft': e.preventDefault(); movePopupFocus(-1);        return true;
        case 'ArrowDown': e.preventDefault(); movePopupFocus(cols);      return true;
        case 'ArrowUp':   e.preventDefault(); movePopupFocus(-cols);     return true;
        case 'Backspace':
        case 'Delete':    e.preventDefault(); closePopup(false);         return true;
      }
      closePopup(true);
      return true;
    }

    // Shared: attach click-to-edit handler for .stok tokens in a contenteditable element.
    function attachTokenClickHandler(el, allowSpeedPopup) {
      el.addEventListener('click', e => {
        const token = (e.target.closest ? e.target : e.target.parentElement)?.closest('.stok');
        if (!token || token.classList.contains('stok-pending')) return;
        clearTokenSelection();
        editingTokenEl  = token;
        activePopupCell = el;
        const ch = token.textContent.trim().charAt(0);
        pendingSwara = SWARA_LETTERS.has(ch.toUpperCase()) ? ch.toUpperCase() : ch;
        if (allowSpeedPopup && !SWARA_LETTERS.has(ch.toUpperCase())) {
          showSpeedPopup(el);
        } else {
          showSwaraPopup(pendingSwara, el);
        }
        syncPopupMarkings();
      });
    }

    function handleNav(e) {
      if (handlePopupKeydown(e)) return;

      const row    = parseInt(e.target.dataset.row);
      const beat   = parseInt(e.target.dataset.beat);
      const isNote = e.target.classList.contains('cell-note');

      if (e.key === 'ArrowRight' && caretAtEnd(e.target)) {
        e.preventDefault();
        focusCellInput(row, beat + 1, isNote) || focusCellInput(row + 1, 1, isNote);
      } else if (e.key === 'ArrowLeft' && caretAtStart(e.target)) {
        e.preventDefault();
        focusCellInput(row, beat - 1, isNote) || focusCellInput(row - 1, lastBeatOfRow(row - 1), isNote);
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (!isNote) focusCellInput(row, beat, true);
        else focusCellInput(row + 1, beat, false);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isNote) focusCellInput(row, beat, false);
        else focusCellInput(row - 1, beat, true);
      } else if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) {
          focusCellInput(row, beat - 1, isNote) || focusCellInput(row - 1, lastBeatOfRow(row - 1), isNote);
        } else {
          focusCellInput(row, beat + 1, isNote) || focusCellInput(row + 1, 1, isNote);
        }
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (!isNote) focusCellInput(row, beat, true);
        else focusCellInput(row, beat + 1, false) || focusCellInput(row + 1, 1, false);
      }
    }

    function lastBeatOfRow(rowNum) {
      let max = 0;
      document.querySelectorAll(`.cell-lyric[data-row="${rowNum}"]`).forEach(c => {
        const b = parseInt(c.dataset.beat); if (b > max) max = b;
      });
      return max;
    }

    function focusCellInput(row, beat, isNote) {
      if (row < 1 || row > rowCount || beat < 1) return false;
      const cls = isNote ? '.cell-note' : '.cell-lyric';
      const el = document.querySelector(`${cls}[data-row="${row}"][data-beat="${beat}"]`);
      if (el) { el.focus(); return true; }
      return false;
    }

    function downloadPDF() {
      const now = new Date();
      const date = now.toLocaleDateString(undefined, { day: '2-digit', month: '2-digit', year: 'numeric' });
      const time = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      document.documentElement.style.setProperty('--print-date', `'${date}, ${time}'`);

    // ── Scale bar ───────────────────────────────────────────
    // Grid: enharmonic pairs share a column (R₂/G₀=col4, R₃/G₁=col5, D₂/N₀=col13, D₃/N₁=col14)
    // Mutual exclusion: selecting one enharmonic auto-deselects the other.
    // Each entry lists all chips that must be deselected when this chip is selected.
    // Covers both enharmonic equals (same pitch) and ordering violations (R > G, D > N).
    const ENHARMONIC_CONFLICTS = {
      'R-2': [['G','0']],
      'R-3': [['G','0'], ['G','1']],
      'G-0': [['R','2'], ['R','3']],
      'G-1': [['R','3']],
      'D-2': [['N','0']],
      'D-3': [['N','0'], ['N','1']],
      'N-0': [['D','2'], ['D','3']],
      'N-1': [['D','3']],
    };

    // Each entry: [row1_chip, row2_chip, gap_before, justify-content]
    // chip: [letter, digit, label] or null
    // justify: centers S/M/P (no complexity), space-between for paired chips,
    //          flex-end for bottom-only chips (G₂, N₂)
    const SCALE_COLS = [
      [['S', null,'S' ],  null,            false, 'center'       ],
      [['R', '1', 'R₁'],  null,            true,  'flex-start'   ],
      [['R', '2', 'R₂'],  ['G','0','G₀'], false, 'space-between'],  // G₀ = R₂
      [['R', '3', 'R₃'],  ['G','1','G₁'], false, 'space-between'],  // G₁ = R₃
      [null,              ['G','2','G₂'],  false, 'flex-end'     ],  // G₂ own col
      [['M', '1', 'M₁'],  null,            true,  'center'       ],
      [['M', '2', 'M₂'],  null,            false, 'center'       ],
      [['P', null, 'P'],   null,            false, 'center'       ],
      [['D', '1', 'D₁'],  null,            true,  'flex-start'   ],
      [['D', '2', 'D₂'],  ['N','0','N₀'], false, 'space-between'],  // N₀ = D₂
      [['D', '3', 'D₃'],  ['N','1','N₁'], false, 'space-between'],  // N₁ = D₃
      [null,              ['N','2','N₂'],  false, 'flex-end'     ],  // N₂ own col
    ];

    function buildScaleChips(container) {
      const byLetter = {};

      function makeChip([letter, digit, label]) {
        const isToggle = (letter === 'S' || letter === 'P') && digit === null;
        const key = digit !== null ? `${letter}-${digit}` : letter;
        const btn = document.createElement('button');
        btn.className = 'scale-chip';

        const nameSp = document.createElement('span');
        nameSp.textContent = label;
        btn.appendChild(nameSp);

        const dirSp = document.createElement('span');
        dirSp.className = 'chip-dir';
        const d = scaleDirection[key];
        dirSp.textContent = d === 'up' ? '↑' : d === 'down' ? '↓' : '';
        btn.appendChild(dirSp);

        if (isToggle) {
          btn.classList.toggle('active', scalePresence[letter] !== false);
          btn.addEventListener('click', () => {
            scalePresence[letter] = !scalePresence[letter];
            btn.classList.toggle('active', scalePresence[letter]);
          });
        } else {
          if (!byLetter[letter]) byLetter[letter] = [];
          byLetter[letter].push(btn);
          if (scaleDefaults[letter] === digit) btn.classList.add('active');
          btn.addEventListener('click', () => {
            if (btn.classList.contains('active')) {
              scaleDefaults[letter] = null;
              scaleDirection[key] = null;
              dirSp.textContent = '';
              btn.classList.remove('active');
            } else {
              scaleDefaults[letter] = digit;
              byLetter[letter].forEach(c => c.classList.remove('active'));
              btn.classList.add('active');
              if (digit !== null) {
                const conflicts = ENHARMONIC_CONFLICTS[`${letter}-${digit}`] || [];
                conflicts.forEach(([cl, cd]) => {
                  if (scaleDefaults[cl] === cd) {
                    scaleDefaults[cl] = null;
                    byLetter[cl].forEach(c => c.classList.remove('active'));
                  }
                });
              }
            }
          });
          btn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            showDirPopup(btn, key, dirSp);
          });
        }
        return btn;
      }

      SCALE_COLS.forEach(([row1, row2, gap, justify]) => {
        const col = document.createElement('div');
        col.style.cssText = `display:flex;flex-direction:column;gap:3px;justify-content:${justify};` +
          (gap ? 'margin-left:8px;' : '');
        if (row1) col.appendChild(makeChip(row1));
        if (row2) col.appendChild(makeChip(row2));
        container.appendChild(col);
      });
    }

    function collectProjectData() {
      const rows = [];
      document.querySelectorAll('#grid .grid-row').forEach(row => {
        if (row.classList.contains('heading-row')) {
          rows.push({ type: 'heading', text: row.querySelector('.heading-text')?.textContent || '' });
        } else if (row.classList.contains('note-row')) {
          rows.push({ type: 'note', text: row.querySelector('.note-text')?.textContent || '' });
        } else if (row.classList.contains('scale-row')) {
          const inputs = [...row.querySelectorAll('.raga-field-input')];
          rows.push({
            type: 'scale',
            raga:          inputs[0]?.textContent || '',
            arohanam:      inputs[1]?.textContent || '',
            beatsRaw:      row.querySelector('.scale-beats-input')?.value || '',
            tala:          inputs[2]?.textContent || '',
            avarohanam:    inputs[3]?.textContent || '',
            ragaCollapsed: row.querySelector('.raga-section')?.classList.contains('collapsed') || false,
          });
        } else {
          rows.push({ type: 'notation', cells: getRowData(row) });
        }
      });
      return {
        version: 1,
        meta: {
          title:    document.getElementById('song-title').value,
          composer: document.getElementById('composer').value,
        },
        scaleDefaults:  { ...scaleDefaults },
        scalePresence:  { ...scalePresence },
        scaleDirection: { ...scaleDirection },
        rows,
      };
    }

    function exportProject() {
      const data = collectProjectData();
      const parser = new DOMParser();
      const doc = parser.parseFromString(document.documentElement.outerHTML, 'text/html');

      // Strip runtime content so the exported file restores cleanly from data
      doc.getElementById('grid').innerHTML = '';
      doc.getElementById('song-title').value = '';
      doc.getElementById('composer').value = '';
      doc.getElementById('download-btn').style.display = 'none';
      doc.getElementById('export-btn').style.display = 'none';
      doc.getElementById('empty-state').style.display = '';
      doc.querySelectorAll('.scale-chip').forEach(c => c.classList.remove('active'));

      // Remove any previous save script, inject fresh one
      const prev = doc.getElementById('carnotic-saved-data');
      if (prev) prev.remove();
      const script = doc.createElement('script');
      script.id = 'carnotic-saved-data';
      script.textContent = 'window.__CARNOTIC_DATA__ = ' + JSON.stringify(data) + ';';
      doc.body.insertBefore(script, doc.body.firstChild);

      const title = (data.meta.title || 'carnotic-notation').replace(/[^a-z0-9\u0B80-\u0BFF]/gi, '_');
      const blob = new Blob(['<!DOCTYPE html>\n' + doc.documentElement.outerHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = title + '.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function restoreProject(data) {
      const m = data.meta || {};
      if (m.title)    document.getElementById('song-title').value = m.title;
      if (m.composer) document.getElementById('composer').value   = m.composer;

      if (data.scaleDefaults)  Object.assign(scaleDefaults,  data.scaleDefaults);
      if (data.scalePresence)  Object.assign(scalePresence,  data.scalePresence);
      if (data.scaleDirection) Object.assign(scaleDirection, data.scaleDirection);

      if (!beats) { beats = 4; groups = [4]; segments = [[4]]; }

      showGrid();
      document.getElementById('grid').innerHTML = '';
      rowCount = 0;

      const grid = document.getElementById('grid');
      (data.rows || []).forEach(rowData => {
        if (rowData.type === 'notation') {
          const row = buildRow(); grid.appendChild(row);
          setRowData(row, rowData.cells);
        } else if (rowData.type === 'heading') {
          const heading = makeHeadingRow(); grid.appendChild(heading);
          const ht = heading.querySelector('.heading-text');
          if (ht) ht.textContent = rowData.text || '';
        } else if (rowData.type === 'note') {
          const note = makeNoteRow(); grid.appendChild(note);
          const nt = note.querySelector('.note-text');
          if (nt) nt.textContent = rowData.text || '';
        } else if (rowData.type === 'scale') {
          const sr = makeScaleRow(); grid.appendChild(sr);
          const inputs = [...sr.querySelectorAll('.raga-field-input')];
          if (inputs[0]) inputs[0].textContent = rowData.raga || '';
          if (inputs[1]) inputs[1].textContent = rowData.arohanam || '';
          const bi = sr.querySelector('.scale-beats-input');
          if (bi) bi.value = rowData.beatsRaw || '';
          if (rowData.beatsRaw) {
            const parsed = parseBeatsInput(rowData.beatsRaw);
            if (parsed) { beats = parsed.beats; groups = parsed.groups; segments = parsed.segments; }
          }
          if (inputs[2]) inputs[2].textContent = rowData.tala || '';
          if (inputs[3]) inputs[3].textContent = rowData.avarohanam || '';
          if (rowData.ragaCollapsed) {
            const rs = sr.querySelector('.raga-section');
            const rt = sr.querySelector('.raga-toggle');
            if (rs) rs.classList.add('collapsed');
            if (rt) rt.textContent = 'carnatic ▴';
          }
        }
      });

      renumber();
    }

    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('mousedown', e => e.preventDefault());
      btn.addEventListener('click', () => {
        pendingSpeed = parseInt(btn.dataset.speed);
        document.querySelectorAll('.speed-btn').forEach(b =>
          b.classList.toggle('active', parseInt(b.dataset.speed) === pendingSpeed)
        );
        if (selectedTokens.length > 0) {
          selectedTokens.forEach(t => { t.dataset.speed = String(pendingSpeed); });
          clearTokenSelection();
        } else if (editingTokenEl) {
          editingTokenEl.dataset.speed = String(pendingSpeed);
        }
      });
    });

    document.querySelectorAll('.gamaka-btn').forEach(btn => {
      btn.addEventListener('mousedown', e => e.preventDefault());
      btn.addEventListener('click', () => {
        const val = btn.dataset.gamaka;
        pendingGamaka = pendingGamaka === val ? '' : val;
        document.querySelectorAll('.gamaka-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.gamaka === pendingGamaka)
        );
        if (selectedTokens.length > 0) {
          selectedTokens.forEach(t => {
            if (pendingGamaka) t.dataset.gamaka = pendingGamaka;
            else delete t.dataset.gamaka;
          });
          clearTokenSelection();
        } else if (editingTokenEl) {
          if (pendingGamaka) editingTokenEl.dataset.gamaka = pendingGamaka;
          else delete editingTokenEl.dataset.gamaka;
        }
      });
    });

    function initRagaField(idOrEl) {
      const el = typeof idOrEl === 'string' ? document.getElementById(idOrEl) : idOrEl;
      el.addEventListener('input', () => {
        if (!el.textContent) el.innerHTML = '';
      });
      attachTokenClickHandler(el, false);
      el.addEventListener('keydown', e => {
        if (handlePopupKeydown(e)) return;

        if (e.key === 'Enter') { e.preventDefault(); return; }

        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key.length > 1) return;
        e.preventDefault();
        if (SWARA_LETTERS.has(e.key.toUpperCase())) {
          const letter = e.key.toUpperCase();
          const def    = scaleDefaults[letter];
          const isUpper = e.key === e.key.toUpperCase();
          if (!isUpper) {
            document.execCommand('insertText', false, letter);
          } else if (!e.shiftKey && def !== null && def !== undefined) {
            document.execCommand('insertText', false, buildSwaraText(letter, '', def));
          } else {
            pendingTokenEl = insertSwaraToken(letter, 0, true, el);
            showSwaraPopup(letter, el);
          }
        } else if (e.key === "'" || NOTE_SYMBOLS.has(e.key)) {
          document.execCommand('insertText', false, e.key);
        } else if (DIGIT_KEYS.has(e.key)) {
          tryInsertDigit(e.key, el);
        }
      });
      el.addEventListener('paste', e => {
        e.preventDefault();
        const raw = e.clipboardData.getData('text/plain');
        let out = '';
        for (const ch of raw) {
          if (SWARA_LETTERS.has(ch.toUpperCase())) out += ch.toUpperCase();
          else if (NOTE_SYMBOLS.has(ch)) out += ch;
          else if (SUB_UNICODE[ch]) out += ch;
        }
        if (out) document.execCommand('insertText', false, out);
      });
    }

    if (window.__CARNOTIC_DATA__) {
      restoreProject(window.__CARNOTIC_DATA__);
    } else {
      document.getElementById('grid').appendChild(makeScaleRow());
      showGrid();
      renumber();
    }
  </script>

</body>
